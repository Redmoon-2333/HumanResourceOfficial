# ============================================================
# дәәеҠӣиө„жәҗдёӯеҝғе®ҳзҪ‘ - еҗҺз«Ҝжһ„е»әдёҺжөӢиҜ?# ============================================================
# и§ҰеҸ‘жқЎд»¶:
#   - push еҲ?main жҲ?develop еҲҶж”Ҝ
#   - pull request еҲ?main жҲ?develop еҲҶж”Ҝ
#
# жһ„е»әжөҒзЁӢ:
#   1. и®ҫзҪ® Java зҺҜеўғ
#   2. Maven жһ„е»ә
#   3. иҝҗиЎҢеҚ•е…ғжөӢиҜ•
#   4. д»Јз ҒиҙЁйҮҸжЈҖжҹ?# ============================================================

name: Backend Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. жЈҖеҮәд»Јз ?      - name: Checkout code
        uses: actions/checkout@v4

      # 2. и®ҫзҪ® Java зҺҜеўғ
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Maven дҫқиө–зј“еӯҳ
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. зј–иҜ‘йЎ№зӣ®
      - name: Compile with Maven
        run: mvn clean compile -B

      # 5. иҝҗиЎҢеҚ•е…ғжөӢиҜ•
      - name: Run tests with Maven
        run: mvn test -B

      # 6. жү“еҢ… JAR
      - name: Package with Maven
        run: mvn package -DskipTests -B

      # 7. дёҠдј жһ„е»әдә§зү©
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          retention-days: 7

  # ============================================================
  # д»Јз ҒиҙЁйҮҸжЈҖжҹ?(еҸҜйҖ?
  # ============================================================
  quality:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # дҪҝз”Ё SpotBugs иҝӣиЎҢд»Јз ҒиҙЁйҮҸжЈҖжҹ?      - name: Run SpotBugs
        run: |
          mvn spotbugs:check -B || true

      # дҪҝз”Ё JaCoCo з”ҹжҲҗжөӢиҜ•иҰҶзӣ–зҺҮжҠҘе‘?      - name: Generate JaCoCo report
        run: mvn jacoco:report -B

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7