# ============================================================
# дәәеҠӣиө„жәҗдёӯеҝғе®ҳзҪ‘ - Docker й•ңеғҸиҮӘеҠЁжһ„е»әдёҺжҺЁйҖ?# ============================================================
# и§ҰеҸ‘жқЎд»¶:
#   - push еҲ?main жҲ?develop еҲҶж”Ҝ
#   - push еҲ?v* ж јејҸзҡ„ж Үзӯ?#
# жһ„е»әжөҒзЁӢ:
#   1. жһ„е»әеҗҺз«Ҝ JAR еҢ?#   2. жһ„е»ә Docker й•ңеғҸ (еӨҡйҳ¶ж®өжһ„е»?
#   3. жү“ж Үзӯ?(еҹәдәҺ Git tag жҲ?commit hash)
#   4. жҺЁйҖҒеҲ° Docker Hub
# ============================================================

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      docker_registry:
        description: 'Docker Registry (default: docker.io)'
        required: false
        default: 'docker.io'
      docker_username:
        description: 'Docker Hub Username'
        required: false
      docker_password:
        description: 'Docker Hub Password (Personal Access Token)'
        required: false

env:
  # Docker й•ңеғҸд»“еә“й…ҚзҪ®
  DOCKER_REGISTRY: ${{ github.event.inputs.docker_registry || 'docker.io' }}
  DOCKER_USERNAME: ${{ github.event.inputs.docker_username || secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ github.event.inputs.docker_password || secrets.DOCKER_PASSWORD }}
  IMAGE_NAME: ${{ github.repository }}
  # й»ҳи®ӨдҪҝз”Ё latest ж ҮзӯҫпјҢtag жҺЁйҖҒж—¶дҪҝз”Ё version ж Үзӯҫ

jobs:
  # ============================================================
  # жһ„е»әе’ҢжҺЁйҖ?Docker й•ңеғҸ
  # ============================================================
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. жЈҖеҮәд»Јз ?      - name: Checkout code
        uses: actions/checkout@v4

      # 2. и®ҫзҪ® Java зҺҜеўғ
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. и®ҫзҪ® Maven зҺҜеўғеҸҳйҮҸ
      - name: Set up Maven
        run: |
          mvn --version
          echo "MAVEN_LOCAL_REPO=$HOME/.m2/repository" >> $GITHUB_ENV

      # 4. Maven дҫқиө–зј“еӯҳ
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 5. жһ„е»әеҗҺз«Ҝ JAR еҢ?      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      # 6. йӘҢиҜҒ JAR еҢ…жһ„е»әжҲҗеҠ?      - name: Verify JAR file
        run: |
          ls -lh target/*.jar
          if [ ! -f "target/HumanResourceOfficial-1.0-SNAPSHOT.jar" ]; then
            echo "JAR file not found!"
            exit 1
          fi

      # 7. и®ҫзҪ® Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 8. зҷ»еҪ• Docker Hub
      - name: Login to Docker Hub
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # 9. жҸҗеҸ–й•ңеғҸе…ғж•°жҚ?(ж Үзӯҫ)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # еҰӮжһңжҳ?tag жҺЁйҖҒпјҢдҪҝз”ЁзүҲжң¬ж Үзӯҫ
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # еҲҶж”Ҝж Үзӯҫ
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # ејҖеҸ‘зүҲжң¬ж Үзӯ?(её?commit hash)
            type=raw,value=dev-${{ github.sha }}.short,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}

      # 10. жһ„е»әе№¶жҺЁйҖ?Docker й•ңеғҸ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # еӨҡе№іеҸ°жһ„е»?(еҸҜйҖүпјҢйңҖиҰ?Docker Hub Pro иҙҰжҲ·)
          # platforms: linux/amd64,linux/arm64
          # жһ„е»әеҸӮж•°
          build-args: |
            JAVA_VERSION=17

      # 11. иҫ“еҮәй•ңеғҸдҝЎжҒҜ
      - name: Image digest
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: echo ${{ steps.push.outputs.digest }}

  # ============================================================
  # йҖҡзҹҘжһ„е»әз»“жһң (еҸҜйҖ?
  # ============================================================
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "вң?Docker й•ңеғҸжһ„е»әжҲҗеҠҹ!"
            echo "й•ңеғҸең°еқҖпј?{{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          else
            echo "вқ?Docker й•ңеғҸжһ„е»әеӨұиҙҘ!"
            exit 1
          fi