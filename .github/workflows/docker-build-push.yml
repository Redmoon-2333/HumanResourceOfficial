name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
      - REDACTED_REDIS_PASS
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      docker_registry:
        description: 'Docker Registry (default: docker.io)'
        required: false
        default: 'docker.io'
      docker_username:
        description: 'Docker Hub Username'
        required: false
      docker_password:
        description: 'Docker Hub Password (Personal Access Token)'
        required: false

env:
  DOCKER_REGISTRY: ${{ github.event.inputs.docker_registry || 'docker.io' }}
  DOCKER_USERNAME: ${{ github.event.inputs.docker_username || secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ github.event.inputs.docker_password || secrets.DOCKER_PASSWORD }}
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME || 'redmoon2333' }}/hrofficial-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package -DskipTests -B

      - name: Verify JAR file
        run: |
          ls -lh target/*.jar
          if [ ! -f "target/HumanResourceOfficial-1.0-SNAPSHOT.jar" ]; then
            echo "JAR file not found!"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev-${{ github.sha }},enable=${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: echo ${{ steps.push.outputs.digest }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "Docker image build succeeded!"
            echo "Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          else
            echo "Docker image build failed!"
            exit 1
          fi
