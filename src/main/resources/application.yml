# ============================================================
# 人力资源中心官网 - 主配置文件
# Spring Boot 3.3.5 + Spring AI 1.0.0
# ============================================================

spring:
  application:
    name: HumanResourceOfficial

  profiles:
    active: dev
    # rabbitmq 已暂时注释，如需启用请添加 RabbitMQ Docker 容器
    # - rabbitmq

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.redis.RedisVectorStoreAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/hrofficial?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:REDACTED_REDIS_PASS}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  ai:
    openai:
      base-url: ${CHATECNU_BASE_URL:https://chat.ecnu.edu.cn/open/api}
      api-key: ${CHATECNU_API_KEY:}
      timeout:
        connect: 30s
        read: 300s
      chat:
        options:
          model: ecnu-plus
          temperature: 0.7
      embedding:
        options:
          model: ecnu-embedding-small
    tool-model: ${AI_TOOL_MODEL:ecnu-max}
    vectorstore:
      redis:
        initialize-schema: true
        index-name: campus-knowledge-index
        prefix: "rag:embedding:"

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.redmoon2333.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:YourJWTSecretKeyMustBeAtLeast256BitsLongForHS256Algorithm}
  expiration: ${JWT_EXPIRATION:604800000}  # 7 天（毫秒）
  # Token 自动刷新阈值（分钟），当剩余有效期低于此值时自动刷新
  # 推荐值：expiration 的 10%-20%，即 10-20 分钟
  refresh:
    threshold: ${JWT_REFRESH_THRESHOLD:30}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    bucketName: ${ALIYUN_OSS_BUCKET_NAME:}

local:
  file:
    upload:
      path: uploads
    access:
      url: ${FILE_ACCESS_URL:http://localhost:8080}

file:
  base-url: ${FILE_ACCESS_URL:http://localhost:8080}

rag:
  knowledge-base-path: ${RAG_KB_PATH:src/main/resources/rag-knowledge-base}

  # ============================================================
  # 智能分块配置（优化 RAG 检索效果）
  # ============================================================
  # 最大分块大小（字符数），400字符平衡检索精度和语义完整性
  chunk-size: 400
  # 分块重叠大小，设置为chunk-size的25%
  chunk-overlap: 100
  # 最小分块大小，过小的块会被合并，避免碎片化
  min-chunk-size: 120
  # 启用语义分块（按章节、段落、句子边界智能分割）
  enable-semantic-chunking: true
  # 自动识别文档类型（结构化/叙述性/技术文档）
  auto-detect-doc-type: true

  # Embedding模型配置
  # ECNU提供: ecnu-embedding-small (1024维)
  # Warning: 修改维度后必须清空Redis索引重建
  embedding-model: ecnu-embedding-small
  embedding-dimensions: 1024
  retrieval-top-k: 5
  score-threshold: 0.0
  # 此配置应与embedding-dimensions保持一致，用于统计信息显示
  vector-dimension: 1024
  enable-batch-processing: true
  batch-size: 25

  # ============================================================
  # 低内存模式配置（适用于1G等低配服务器）
  # Why: 防止RAG初始化时内存溢出导致服务器死机
  # ============================================================
  # 启用低内存模式（低配服务器建议设置为true）
  low-memory-mode: false
  # 内存使用率警告阈值，超过后触发GC
  memory-warning-threshold: 0.7
  # 内存使用率危险阈值，超过后暂停处理等待释放
  memory-critical-threshold: 0.85
  # 文件处理间隔（毫秒），降低CPU和内存峰值
  file-process-delay-ms: 0
  # 单个文件大小限制（MB），0表示不限制
  max-file-size-mb: 0
  # 低内存模式下的批处理大小
  low-memory-batch-size: 5
  # 低内存模式下的文件处理间隔（毫秒）
  low-memory-file-delay-ms: 500

ai:
  chat:
    memory:
      ttl: 168

logging:
  level:
    root: INFO
    com.redmoon2333: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
